<!DOCTYPE html>
<html lang="en">
<head>
    <title>Begger Details</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>   

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

      crossorigin="anonymous">
    </script>

    <script>
        function doPrev(event, fileId)
            {
                const file= event.target.files[0];
                if(file != null)
                    document.getElementById(fileId).src=URL.createObjectURL(file);
            }
    </script>

</head>
<body>
    
    <div class="row">
            <div class="col-md-12 fs-2 bg-danger text-white">
                <center>
                     Begger's Details
                </center>
            </div>
        </div>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
        
    <form action="/Bagger-Details" method="post" enctype="multipart/form-data">

        <div class="row">
            <div class="col-md-8">
                <label for="volRefId" class="form-label">Volantaier's Email</label>
                <input type="email" class="form-control" id="volRefId" name="volRefId" aria-describedby="emailHelp" required>
            </div>
        </div>

        <!-- <div class="row">
            <div class="col-md-4">
                <label for="baggName" class="form-label">Name</label>
                <input type="text" class="form-control" id="baggName" name="baggName" required>
            </div>

        <div class="col-md-2">
            <label for="baggAge" class="form-label">Age</label>
            <input type="number" class="form-control" id="baggAge" name="baggAge" required>
        </div>

        <div class="col-md-4">
            <label for="baggGender" class="form-label">Gender</label>
            <select id="baggGender" name="baggGender" class="form-select" required>
                <option value="">Choose...</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="other">other</option>
            </select>
        </div>

        </div> -->
        
        <div class="row">
            <div class="col-md-6">
                <label for="baggAddress" class="form-label">Address</label>
                <input type="text" class="form-control" id="baggAddress" name="baggAddress" required>
            </div>

            <div class="col-md-3">
                <label for="baggCity" class="form-label">City</label>
                <input type="text" class="form-control" id="baggCity" name="baggCity" required>
            </div>
        </div>

    <div class="row">
        <div class="col-md-4">
            <label for="baggWork" class="form-label">Type of work</label>
            <select id="baggWork" name="baggWork" class="form-select"required>
                <option value="">Choose...</option>
                <option value="cleaning">cleaning</option>
                <option value="watchman">watchman</option>
                <option value="construction">construction</option>
                <option value="cooking">cooking</option>
                <option value="gardner">gardener</option>
            </select>
        </div>

        <div class="col-md-4">
            <label for="baggNumber" class="form-label">Contact Number</label>
            <input type="number" id="baggNumber" name="baggNumber" class="form-control" required>
        </div>
    </div>

   <div class="row">
        <div class="col-md-2 ">
            <label for="" class="form-label">Upload Adhar Proof</label>
        </div>

        <div class="col-md-2">
            <img src="" id="baggProofPic" width="120px" height="120px">
        </div>

        <input type="file" name="baggFileProof" id="baggFileProof"  onchange="doPrev(event,'baggProofPic');">
        


        <div class="col-md-2">
           <label for="" class="form-label">His/Her Pic</label>
        </div>


        <div class="col-md-2">
            <img src="" id="baggPic" width="120px" height="120px">
        </div>

         <input type="file" name="baggFilePic" id="baggFilePic"  onchange="doPrev(event,'baggPic');">



        
    </div> 

   <div class="row">
    <div class="col-md-4 text-end">
        <button type="submit"  class="btn btn-dark w-100 mt-3" >Publish Data</button>
    </div>
   </div>


</form>
