    <style>

      .ok {
      color: green;
      font-weight: bold;
       }

      .not-ok{
          color: red;
          font-weight: bold;
      }

      body {
            background: #f5f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

      .navbar-brand {
            color: #fff !important;
            font-weight: bold;
        }

      /* Heading */
        .dashboard-title {
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 8px;
            margin: 20px 0;
        }

      .card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card:hover {
            cursor: pointer;
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

    </style>


    <script>
      $(document).ready(function(){              // <!-- AJAX-->

          let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          let pwdRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{6,}$/;


            $("#btnChange").click(function(){

                let obj = {
                    url: "/updateCitizenPass",
                    type: "GET",   // because server me app.get hai
                    data: {
                        settingEml: $("#settingEml").val(),
                        oldPwd: $("#oldPwd").val(),
                        newPwd: $("#newPwd").val(),
                    }
                };

                $.ajax(obj)
                .done(function(resp){
                    alert(resp);
                })
                .fail(function(err){
                    alert("Error occurred");
                });

            });

      
       $("logoutbtn").click(function()
          {
            localStorage.removeItem("activeuser");
            location.href="index.html";
          })

          // --------------------------- EMAIL VALIDATION -----------------------------
          $("#settingEml").blur(function()
          {
              let email = $(this).val();

              if(emailRegex.test(email))
                  $("#errSettingEmail").html("Valid")
                  .addClass("ok")
                  .removeClass("not-ok");
              else
                  $("#errSettingEmail").html("Invalid")
                  .addClass("not-ok")
                  .removeClass("ok");
          });


          // --------------------------- NEW PASSWORD VALIDATION ----------------------
          $("#newPwd").blur(function()
          {
              let pwd = $(this).val();

              if(pwdRegex.test(pwd))
                  $("#errNewPwd").html("Valid")
                  .addClass("ok")
                  .removeClass("not-ok");
              else
                  $("#errNewPwd").html("Invalid")
                  .addClass("not-ok")
                  .removeClass("ok");
          });


          // --------------------------- OLD PASSWORD VALIDATION ----------------------
          $("#oldPwd").blur(function()
          {
              let pwd = $(this).val();

              if(pwdRegex.test(pwd))
                  $("#errOldPwd").html("Valid")
                  .addClass("ok")
                  .removeClass("not-ok");
              else
                  $("#errOldPwd").html("Invalid")
                  .addClass("not-ok")
                  .removeClass("ok");
          });

           //----------------------------EYE ON PASSWORD------------------
           $("#eyeOld").click(function()
          {
              if($("#oldPwd").prop("type")=="password")
              {
                  $("#oldPwd").prop("type","text");
                  $("#eyeOld").addClass("fa-eye-low-vision").removeClass("fa-eye");
              }
              else
              {
                  $("#oldPwd").prop("type","password");
                  $("#eyeOld").removeClass("fa-eye-low-vision").addClass("fa-eye");
              }
          });

          $("#eyeNew").click(function()
          {
              if($("#newPwd").prop("type")=="password")
              {
                  $("#newPwd").prop("type","text");
                  $("#eyeNew").addClass("fa-eye-low-vision").removeClass("fa-eye");
              }
              else
              {
                  $("#newPwd").prop("type","password");
                  $("#eyeNew").removeClass("fa-eye-low-vision").addClass("fa-eye");
              }
          });


        
        });

      $(document).ready(function(){ 
          alert(localStorage.getItem("activeuser"))

      });

    </script>
</head>

                      <!----------------------------  setting modal---------------->   
<div class="modal fade" id="settingModal" tabindex="-1" aria-labelledby="exampleSettingModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleSettingModalLabel">Settings</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">

        <form action="/updateCitizenPass" method="post">                        

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="settingEml" name="settingEml" class="form-control" required>
              <span id="errSettingEmail"></span>  
          </div>

          <div class="mb-3">
              <label class="form-label">Old Password</label>

              <div class="input-group">
                <input type="password" id="oldPwd" name="oldPwd" class="form-control" required>

                <span class="input-group-text">
                  <i class="fa-solid fa-eye" id="eyeOld"></i>
                </span>
              </div>

              <span id="errOldPwd"></span>
            </div>

          <div class="mb-3">
              <label class="form-label">New Password</label>

              <div class="input-group">
              <input type="password" id="newPwd" name="newPwd" class="form-control" required>

                <span class="input-group-text">
                 <i class="fa-solid fa-eye" id="eyeNew"></i>
                </span>
              </div>

            <span id="errNewPwd"></span>
        </div>


          <div class="text-center">
            <!--  must be submit -->
            <button type="submit" class="btn btn-primary">
              Change Password
            </button>
          </div>

    </form>
        
      </div>
    </div>
  </div>
</div>

<script>
  //----------------------------------------ALERT FOR RECORD SAVE OR NOT---------------------------
  window.onload = function () {
    let params = new URLSearchParams(window.location.search);
    let msg = params.get("msg");

    if (msg === "success") {
        alert("Profile submitted successfully ✅");
    }
    else if (msg === "error") {
        alert("Something went wrong ❌");
    }
    else if (msg === "updated") {
        alert("Password Updated Successfully");
    }
    else if (msg === "wrongold") {
        alert("Invalid Old Password");
    }
    else if (msg === "usernotfound") {
        alert("User not found");
    }
    else if (msg === "allfields") {
        alert("All fields are required");
    }
    else if (msg === "shortpwd") {
        alert("Password must be at least 6 characters");
    }

    if (msg) {
        window.history.replaceState({}, document.title, window.location.pathname);
    }
};
      
</script>
