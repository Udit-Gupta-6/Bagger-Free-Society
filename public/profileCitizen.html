<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citizen Profile</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

      <script>        //-----------PREV----------------
      function doPrev(event, imgId)
        {
            const file = event.target.files[0];
            if (file != null) {
                document.getElementById(imgId).src = URL.createObjectURL(file);
            }
        }
    </script>

  </head>
  <body>

    <div class="row bg-primary text-white text-center">
      <h2>Citizen Profile</h2>
    </div>

    <div class="container border border-black">
      <form action="/citizen-profile" method="post" enctype="multipart/form-data">

        <div class="row ">
          <!-------------------Images input field------------------->
          <div class="col-md-4 text-center">
            <section>
              <!---------------------Front Pic--------------->
                <img src="" id="citizenAdharFront" name="citizenAdharFront" width="200px" height="200px" /><br>

                <label class="btn btn-outline-primary btn-sm upload-btn w-75 mt-2">Upload Front
                  <input type="file" name="fileAdharFront" id="fileAdharFront" hidden onchange="doPrev(event, 'citizenAdharFront')"/>
                </label>
              
                <!-- <input type="file" required accept="image/*" class="btn btn-primary" value="Upload Adhar card Front" onchange="doPrev(event,'citizenAdharFront')"> -->
             
            </section>
            <!-------------------------BACK PIC------------------>
             <section class="mt-3">
              
                <img src="" id="citizenAdharBack" name="citizenAdharBack" width="200px" height="200px" /> <br>

                <label class="btn btn-outline-primary btn-sm w-75 mt-2">Upload Backside
                 <input type="file" name="fileAdharBack" id="fileAdharBack" hidden onchange="doPrev(event, 'citizenAdharBack')"/>
                </label>
                
                <!-- <input type="file" required accept="image/*" class="btn btn-primary" value="Upload Adhar card Back" onchange="doPrev(event, 'citizenAdharBack')"> -->
             
            </section>
          </div>

          <!---------------------Right Side Form--------------------->
          <div class="col-md-8">
              
             <div class="row mt-2">
              <div class="col-md-6">
                <label class="form-label" for="citizenEmail">Email Id</label>
                <input type="email" name="citizenEmail" id="citizenEmail" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label class="form-label" for="citizenNo">Mobile Number</label>
                <input type="number" name="citizenNo" id="citizenNo" class="form-control" required />
              </div>
             </div>

             <div class="row mt-2">
              <div class="col-md-5">
                <label class="form-label" for="citizenName">Name</label>
                <input type="text" name="citizenName" id="citizenName" class="form-control" required />
              </div>

              <div class="col-md-7">
                <label class="form-label" for="citizenAdharNo">Adhaar Card Nunmber</label>
                <input type="text" name="citizenAdharNo" id="citizenAdharNo" class="form-control" required />
              </div>
             </div>

             <div class="row">
              <div class="col-md-4">
                <label class="form-label" for="citizenFather">Father's Name</label>
                <input type="text" id="citizenFather" name="citizenFather" class="form-control" required />
              </div>

              <div class="col-md-4">
                <label class="form-label" for="citizenDob">Date of Birth</label>
                <input type="date" id="citizenDob" name="citizenDob" class="form-control" required />
              </div>

              <div class="col-md-4">
                <label class="form-label" for="citizenGender">Gender</label>
                <select id="citizenGender" name="citizenGender" class="form-select" required>
                            <option value=""selected disabled>Choose...</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                          </select>
              </div>
             </div>

             <div class="row">
              <div class="col-md-7">
                <label for="citizenAddress" class="form-label">Address</label>
                <input type="text" id="citizenAddress" name="citizenAddress" class="form-control" required />
              </div>

              <div class="col-md-5">
                <label for="citizenCity" class="form-label">City</label>
                <input type="text" id="citizenCity" name="citizenCity" class="form-control" required />
              </div>
             </div>

              <div class="col-md-12 text-center mt-3">
                <button type="submit" class="btn btn-primary">Save</button>
              </div> 
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
