<!DOCTYPE html>
<html lang="en">
<head>
    <title>All Users</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous">
    </script>

    <script>
        var module=angular.module("usersModule",[]);
        module.controller("usersController",function($scope,$http)
        {
            $scope.jsonAry=[];

            $scope.doFetchUsers=function()
                {
                    $http.get("angular-fetchUsers").then(allGood,errKuch)
                    function allGood(result)
                        {
                            alert(JSON.stringify(result.data));
                            $scope.jsonAry=result.data;
                        }

                    function errKuch(err)
                        {
                            alert(err);
                        }
                }

            $scope.doBlock=function(txtEmail)
                {
                    $http.get("/angular-userBlock?txtEmail="+txtEmail).then(allGood,errBad);
                        function allGood(result)
                            {
                                alert(result.data);
                            }

                        function errBad(err)   
                            {
                                alert(err);
                            }
                }

            $scope.doResume=function(txtEmail)
                {
                    $http.get("/angular-userResume?txtEmail="+txtEmail).then(allGood,errBad);
                        function allGood(result)
                            {
                                alert(result.data);
                            }

                        function errBad(err)   
                            {
                                alert(err);
                            }
                }
        })

    </script>
</head>
<body ng-app="usersModule" ng-controller="usersController">

    <div class="container mt-2">

        <!-------------------HEADING------------->
        <div class="row bg-primary text-white text-center">
            <h2>All Users Records</h2>
        </div>

        <!------------------FETCH BTN--------------->
        <div class="text-center mt-2 mb-2">
            <button class="btn btn-success" ng-click="doFetchUsers()">
                Fetch Users
            </button>
        </div>

        <!-------------------TABLE-------------------->
        <div class="table-responsive">
        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Sr.No</th> <th>Email id</th> <th>User Type</th> <th>Date of Signing</th> <th> Status</th> <th>Operations</th>
                </tr>
            </thead>

            <tbody>
                <tr ng-repeat="obj in jsonAry" height="50">
                        
                    <td>{{$index+1}}</td>
                    <td>{{obj.txtEmail}}</td>
                    <td>{{obj.txtUtype}}</td>
                    <td>{{obj.txtDos.split('T')[0]}}</td>
                    <td>{{obj.txtStatus}}</td>

                            <th>
                                <input type="button" value="Block" ng-click="doBlock(obj.txtEmail);">
                                <input type="button" value="Resume" ng-click="doResume(obj.txtEmail);">
                            </th>                    
                </tr>
            </tbody>
        </table>
        </div>
    </div>
        </center>

</body>
</html>
